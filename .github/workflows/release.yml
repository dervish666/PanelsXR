# Build, test, and publish the Panel container on a version tag.
#
# Pushing a tag like `v0.2.1` runs the type/test gate, then buildx-pushes a
# multi-arch image to Docker Hub tagged both `:vX.Y.Z` and `:latest`, with the
# version baked into the OCI label (so the published image is reproducible from
# the repo — not hand-built).
#
# Requires two repo secrets (Settings → Secrets and variables → Actions):
#   DOCKERHUB_USERNAME  — the Docker Hub account (e.g. dervish)
#   DOCKERHUB_TOKEN     — a Docker Hub access token with push scope
name: release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # The same gate the dev loop uses: type-check + headset-independent tests.
      - run: npm run build
      - run: npm test

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            PANEL_VERSION=${{ github.ref_name }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/panelsxr:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/panelsxr:${{ github.ref_name }}
